<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">A hosszú tengeri utak eszközei</title><desc id="desc">Négy sematikus mező a karavella, az iránytű, az asztrolábium, valamint a térkép és hajózási tudás szerepéről.</desc>
  <rect width="1200" height="675" rx="28" fill="#eef4f1"/><g font-family="Arial, sans-serif" fill="#173f55">
  <g transform="translate(45 45)"><rect width="535" height="270" rx="24" fill="#fff" stroke="#b8ccc4" stroke-width="4"/><path d="M90 185h270l-42 35H132z" fill="#8a4f2a"/><path d="M210 52v135M215 62l105 75H215zM202 82l-82 55h82z" fill="#d6b879" stroke="#173f55" stroke-width="5"/><text x="390" y="105" font-size="34" font-weight="700">Karavella</text><text x="390" y="150" font-size="22" text-anchor="middle">jól irányítható hajó</text><text x="390" y="180" font-size="22" text-anchor="middle">hosszabb utakra</text></g>
  <g transform="translate(620 45)"><rect width="535" height="270" rx="24" fill="#fff" stroke="#b8ccc4" stroke-width="4"/><circle cx="145" cy="135" r="82" fill="#dceae5" stroke="#173f55" stroke-width="7"/><path d="M145 65l22 80-22 60-22-60z" fill="#b5603f"/><text x="360" y="115" font-size="34" font-weight="700" text-anchor="middle">Iránytű</text><text x="360" y="160" font-size="22" text-anchor="middle">az irány tartását</text><text x="360" y="190" font-size="22" text-anchor="middle">segítette</text></g>
  <g transform="translate(45 360)"><rect width="535" height="270" rx="24" fill="#fff" stroke="#b8ccc4" stroke-width="4"/><circle cx="150" cy="135" r="78" fill="none" stroke="#8a4f2a" stroke-width="12"/><path d="M95 188l110-106M85 135h130M150 57v156" stroke="#173f55" stroke-width="6"/><text x="365" y="115" font-size="34" font-weight="700" text-anchor="middle">Asztrolábium</text><text x="365" y="160" font-size="22" text-anchor="middle">az égitestek alapján</text><text x="365" y="190" font-size="22" text-anchor="middle">támogatta a tájékozódást</text></g>
  <g transform="translate(620 360)"><rect width="535" height="270" rx="24" fill="#fff" stroke="#b8ccc4" stroke-width="4"/><path d="M72 65l118-22 86 30 105-25v160l-105 25-86-30-118 22z" fill="#d6b879" stroke="#173f55" stroke-width="6"/><path d="M190 43v160M276 73v160" stroke="#8a4f2a" stroke-width="4"/><text x="438" y="105" font-size="31" font-weight="700" text-anchor="middle">Térkép és tudás</text><text x="438" y="150" font-size="22" text-anchor="middle">a tapasztalatokat</text><text x="438" y="180" font-size="22" text-anchor="middle">összegezte</text></g></g>
</svg>

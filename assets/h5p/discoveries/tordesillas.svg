<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc"><title id="title">A tordesillasi választóvonal</title><desc id="desc">Sematikus atlanti térkép, amely nyugati spanyol és keleti portugál érdekszférát, valamint Brazília helyzetét jelöli.</desc><rect width="1200" height="675" rx="28" fill="#dcecf0"/><rect x="0" width="575" height="675" fill="#8a4f2a" opacity=".10"/><rect x="575" width="625" height="675" fill="#1b7770" opacity=".10"/><path d="M120 90l260 20 110 110-45 100 80 105-105 165-220-35-90-205z" fill="#e4ce9e" stroke="#6d5635" stroke-width="6"/><path d="M920 100l210 40-40 135-150 70-92-95zM850 310l180 55-82 225-135-115z" fill="#e4ce9e" stroke="#6d5635" stroke-width="6"/><path d="M575 45v585" stroke="#b34f36" stroke-width="14" stroke-dasharray="22 14"/><g font-family="Arial,sans-serif" fill="#173f55"><text x="55" y="65" font-size="38" font-weight="700">Tordesillas, 1494</text><text x="165" y="635" font-size="28">Spanyol érdekszféra</text><text x="780" y="635" font-size="28">Portugál érdekszféra</text><text x="595" y="105" font-size="23">választóvonal</text><text x="860" y="520" font-size="25">Brazília térsége</text></g></svg>

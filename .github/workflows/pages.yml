name: Build, test and deploy GitHub Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Build Földrajzi felfedezések H5P package
        run: python3 scripts/build_discoveries_h5p.py

      - name: Audit generated H5P package
        run: python3 scripts/audit_discoveries_h5p.py

      - name: Build Géza and István H5P package
        run: python3 scripts/build_geza_istvan_h5p.py

      - name: Audit Géza and István H5P package
        run: python3 scripts/audit_geza_istvan_h5p.py

      - name: Build static site
        run: npm run build

      - name: Sanitize published learner artifacts
        run: python3 scripts/sanitize_student_build.py

      - name: Verify build and H5P assets
        run: npm run verify

      - name: Audit every student-facing module
        run: python3 scripts/audit_student_build.py

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run desktop and mobile smoke tests
        run: npm test

      - name: Run Lighthouse quality gate
        run: |
          python3 -m http.server 4173 -d _site >/tmp/dtea-http.log 2>&1 &
          npx lighthouse http://127.0.0.1:4173/ \
            --preset=desktop \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance,accessibility,best-practices,seo \
            --output=json \
            --output-path=lighthouse-report.json \
            --quiet
          npm run lighthouse:check -- lighthouse-report.json

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report.json
          retention-days: 14

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Földrajzi felfedezések H5P package
        uses: actions/upload-artifact@v4
        with:
          name: foldrajzi-felfedezesek-h5p
          path: content/digitalis-tortenelem-erettsegi-akademia-foldrajzi-felfedezesek-v1.0.h5p
          retention-days: 30

      - name: Upload Géza and István H5P package
        uses: actions/upload-artifact@v4
        with:
          name: geza-fejedelem-szent-istvan-h5p
          path: content/digitalis-tortenelem-erettsegi-akademia-geza-fejedelem-szent-istvan-v1.0.h5p
          retention-days: 30

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
